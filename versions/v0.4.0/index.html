<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="screen-orientation" content="landscape">
<title>桃源田居</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#1a3320;
  font-family:'STKaiti','KaiTi','楷体',serif;
  overflow:hidden; touch-action:none; user-select:none;
}
canvas { display:block; }

/* 强制横屏提示 */
#rotate-tip {
  display:none;
  position:fixed; inset:0; z-index:999;
  background:#1a3320;
  flex-direction:column; align-items:center; justify-content:center;
  color:#f5d78e; font-size:18px; letter-spacing:2px; gap:16px;
}
#rotate-tip .icon { font-size:60px; animation: rotateIcon 1.5s infinite; }
@keyframes rotateIcon { 0%{transform:rotate(0)} 50%{transform:rotate(90deg)} 100%{transform:rotate(90deg)} }
@media (orientation: portrait) {
  #rotate-tip { display:flex; }
  #game-wrap { display:none; }
}

#game-wrap { width:100%; height:100%; position:relative; }

/* HUD */
#hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:10px 14px;
  pointer-events:none; z-index:10;
}
.hud-left { display:flex; flex-direction:column; gap:4px; }
.hud-coin {
  display:flex; align-items:center; gap:5px;
  background:rgba(40,25,8,0.7); border:1px solid #c8922a;
  border-radius:16px; padding:4px 12px;
  font-size:14px; color:#f5d78e;
}
.hud-day {
  display:flex; align-items:center; gap:5px;
  background:rgba(40,25,8,0.7); border:1px solid #6a8a40;
  border-radius:16px; padding:4px 12px;
  font-size:13px; color:#c8e890;
}

/* 底部UI */
#bottom-ui {
  position:absolute; bottom:0; left:0; right:0;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:0 16px 16px;
  pointer-events:none; z-index:10;
}

/* 摇杆 */
#joystick-wrap {
  width:100px; height:100px; position:relative;
  pointer-events:all; flex-shrink:0;
}
#joy-base {
  width:100px; height:100px; border-radius:50%;
  background:rgba(40,25,8,0.4); border:2px solid rgba(200,160,60,0.35);
  position:absolute;
}
#joy-stick {
  width:42px; height:42px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, rgba(255,200,80,0.9), rgba(180,120,30,0.7));
  border:2px solid rgba(240,180,60,0.7);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  position:absolute; top:29px; left:29px;
  pointer-events:none;
}

/* 工具栏 */
#toolbar {
  display:flex; gap:6px; align-items:flex-end;
  pointer-events:all;
}
.tool-btn {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  background:rgba(40,25,8,0.7); border:1.5px solid #6a4a20;
  border-radius:12px; padding:7px 10px; cursor:pointer;
  transition:all 0.15s;
}
.tool-btn.active {
  background:rgba(160,110,20,0.5); border-color:#e8b84a;
  box-shadow:0 0 10px rgba(232,184,74,0.4);
}
.tool-btn:active { transform:scale(0.92); }
.tool-icon { font-size:20px; }
.tool-name { font-size:9px; color:#b08040; letter-spacing:1px; }
.tool-btn.active .tool-name { color:#f5d78e; }

/* 行动按钮 */
#action-btn {
  width:70px; height:70px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, rgba(120,200,80,0.9), rgba(60,130,30,0.7));
  border:2px solid rgba(140,220,80,0.7);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; cursor:pointer; pointer-events:all;
  flex-shrink:0;
}
#action-btn:active { transform:scale(0.9); }

/* Toast */
#toast {
  position:absolute; top:56px; left:50%; transform:translateX(-50%);
  background:rgba(40,25,8,0.9); border:1px solid #c8922a;
  border-radius:20px; padding:7px 18px;
  font-size:13px; color:#f5d78e; letter-spacing:1px;
  z-index:20; pointer-events:none; white-space:nowrap;
  opacity:0; transition:opacity 0.3s;
}
#toast.show { opacity:1; }

/* 商店 */
#shop-panel {
  position:absolute; inset:0; z-index:30;
  background:rgba(10,5,0,0.8);
  display:none; align-items:center; justify-content:center;
}
.shop-box {
  background:linear-gradient(160deg,#3d2010,#251508);
  border:2px solid #c8922a; border-radius:18px;
  padding:16px; width:360px; max-height:85vh; overflow-y:auto;
  display:flex; flex-direction:column; gap:10px;
}
.shop-title { text-align:center; font-size:17px; color:#f5d78e; letter-spacing:3px; }
.shop-section-label { font-size:10px; color:#a08040; letter-spacing:2px; }
.shop-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.sitem {
  background:rgba(180,130,50,0.1); border:1px solid #6a4a20;
  border-radius:10px; padding:8px 4px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer;
}
.sitem:active { transform:scale(0.93); background:rgba(200,160,60,0.2); }
.sitem-icon { font-size:20px; }
.sitem-name { font-size:10px; color:#d4a060; }
.sitem-price { font-size:10px; color:#f5d78e; }
.sitem-desc { font-size:9px; color:#886640; text-align:center; }
.shop-close {
  padding:9px; background:rgba(140,60,20,0.4); border:1px solid #b06030;
  border-radius:10px; color:#f0a060; font-size:13px;
  cursor:pointer; font-family:inherit; letter-spacing:2px; text-align:center;
}
</style>
</head>
<body>

<div id="rotate-tip">
  <div class="icon">📱</div>
  <div>请横屏游玩～</div>
</div>

<div id="game-wrap">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <div class="hud-coin">🪙 <span id="coinVal">80</span> 枚</div>
      <div class="hud-day">第<span id="dayVal">1</span>天 &nbsp;<span id="seasonVal">🌸春</span></div>
    </div>
  </div>

  <!-- 底部UI -->
  <div id="bottom-ui">
    <!-- 摇杆 -->
    <div id="joystick-wrap">
      <div id="joy-base"></div>
      <div id="joy-stick"></div>
    </div>

    <!-- 工具栏 -->
    <div id="toolbar">
      <div class="tool-btn active" data-tool="hoe" onclick="setTool(this,'hoe')"><span class="tool-icon">⛏️</span><span class="tool-name">锄地</span></div>
      <div class="tool-btn" data-tool="seed" onclick="setTool(this,'seed')"><span class="tool-icon">🌱</span><span class="tool-name">播种</span></div>
      <div class="tool-btn" id="seed-switch-btn" onclick="switchSeed()" title="切换种子"><span class="tool-icon" id="seed-switch-icon">🌾</span><span class="tool-name" id="seed-switch-name">小麦</span></div>
      <div class="tool-btn" data-tool="water" onclick="setTool(this,'water')"><span class="tool-icon">💧</span><span class="tool-name">浇水</span></div>
      <div class="tool-btn" data-tool="harvest" onclick="setTool(this,'harvest')"><span class="tool-icon">🌾</span><span class="tool-name">收获</span></div>
      <div class="tool-btn" data-tool="shop" onclick="openShop()"><span class="tool-icon">🏪</span><span class="tool-name">商店</span></div>
      <div class="tool-btn" data-tool="sleep" onclick="nextDay()"><span class="tool-icon">🌙</span><span class="tool-name">入睡</span></div>
    </div>

    <!-- 行动按钮 -->
    <div id="action-btn" onclick="doAction()">✅</div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- 商店 -->
  <div id="shop-panel">
    <div class="shop-box">
      <div class="shop-title">📜 桃源杂货铺</div>
      <div class="shop-section-label">── 种子 ──</div>
      <div class="shop-grid">
        <div class="sitem" onclick="buySeed('wheat')"><span class="sitem-icon">🌾</span><span class="sitem-name">小麦</span><span class="sitem-price">🪙5</span><span class="sitem-desc">3天·售10</span></div>
        <div class="sitem" onclick="buySeed('carrot')"><span class="sitem-icon">🥕</span><span class="sitem-name">萝卜</span><span class="sitem-price">🪙8</span><span class="sitem-desc">4天·售18</span></div>
        <div class="sitem" onclick="buySeed('cabbage')"><span class="sitem-icon">🥬</span><span class="sitem-name">白菜</span><span class="sitem-price">🪙12</span><span class="sitem-desc">5天·售30</span></div>
        <div class="sitem" onclick="buySeed('peach')"><span class="sitem-icon">🍑</span><span class="sitem-name">桃子</span><span class="sitem-price">🪙30</span><span class="sitem-desc">7天·售80</span></div>
      </div>
      <div class="shop-section-label">── 出售农产品 ──</div>
      <div class="shop-grid" id="sellGrid"></div>
      <div class="shop-close" onclick="closeShop()">关闭</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 画布初始化
// ============================================================
const wrap = document.getElementById('game-wrap');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// 俧视角地图配置
// ============================================================
const TILE = 48;  // 每格地块像素大小
const MAP_COLS = 18, MAP_ROWS = 14;

// 瓦片类型
const T = { GRASS:0, SOIL:1, TILLED:2, CROP:3, HOUSE:4, WELL:5, SHOP:6, TREE:7, PATH:8, WATER:9 };

let tileMap = [], cropMap = [];
for(let r=0;r<MAP_ROWS;r++){
  tileMap[r]=new Array(MAP_COLS).fill(T.GRASS);
  cropMap[r]=new Array(MAP_COLS).fill(null);
}

// 小路
for(let c=3;c<15;c++) tileMap[MAP_ROWS-1][c]=T.PATH;
for(let r=4;r<MAP_ROWS;r++) tileMap[r][8]=T.PATH;

// 建筑
tileMap[2][3]=T.HOUSE;
tileMap[2][13]=T.SHOP;
tileMap[5][14]=T.WELL;

// 水塘
[[1,7],[1,8],[1,9],[2,7],[2,8]].forEach(([r,c])=>tileMap[r][c]=T.WATER);

// 树木
[[0,0],[0,1],[0,16],[0,17],[1,0],[1,17],[12,0],[12,17],[13,0],[13,17],
 [0,5],[0,11],[3,1],[3,16]].forEach(([r,c])=>tileMap[r][c]=T.TREE);

// ============================================================
// 相机
// ============================================================
let camX=0, camY=0;

// 俧视角坐标转屏幕坐标
function iso(wx, wy) {
  const W = canvas.width, H = canvas.height;
  return {
    x: wx * TILE + TILE/2 - camX,
    y: wy * TILE + TILE/2 - camY,
  };
}

// ============================================================
// 作物配置
// ============================================================
const CROPS = {
  wheat:   {icon:'🌾',name:'小麦',days:3,cost:5, sell:10, stages:['🌱','🌿','🌾']},
  carrot:  {icon:'🥕',name:'萝卜',days:4,cost:8, sell:18, stages:['🌱','🌿','🥕','🥕']},
  cabbage: {icon:'🥬',name:'白菜',days:5,cost:12,sell:30, stages:['🌱','🌿','🥬','🥬','🥬']},
  peach:   {icon:'🍑',name:'桃子',days:7,cost:30,sell:80, stages:['🌱','🌿','🌲','🌳','🌳','🌳','🍑']},
};

// ============================================================
// 游戏状态
// ============================================================
let coins=80, day=1, seasonIdx=0;
let currentTool='hoe', selectedSeed='wheat';
let seedBag={wheat:3,carrot:1}, harvestBag={};
const SEASONS=['🌸春','☀️夏','🍂秋','❄️冬'];

// ============================================================
// 玩家
// ============================================================
const player = {
  wx:8.5, wy:10.5,
  dir:'down', moving:false,
  blinkTimer:0,
};

// ============================================================
// 绘制地图
// ============================================================
const GROUND_COLORS = {
  [T.GRASS]:  '#5aaa3a',
  [T.SOIL]:   '#c8945a',
  [T.TILLED]: '#7a4a22',
  [T.PATH]:   '#d4b870',
  [T.WATER]:  '#5ab8e8',
  [T.CROP]:   '#7a4a22',
  [T.TREE]:   '#5aaa3a',
  [T.HOUSE]:  '#5aaa3a',
  [T.WELL]:   '#5aaa3a',
  [T.SHOP]:   '#5aaa3a',
};

// ============================================================
// 加载 Tileset
// ============================================================
const tilesetImg = new Image();
tilesetImg.src = 'assets/images/map/tiles/map_tiles_grass_summer.png';
let tilesetLoaded = false;
tilesetImg.onload = () => { tilesetLoaded = true; };

const TS = 16; // tileset 单格大小
// 各地块类型对应的 tileset 坐标 {col, row}
const TILE_UV = {
  [T.GRASS]:  { col:0, row:3 },  // 老危指定：第1列第4行（从0计）
  [T.SOIL]:   { col:0, row:3 },  // 暂用草地
  [T.TILLED]: { col:0, row:3 },  // 暂用草地（后续更换耕地素材）
  [T.PATH]:   { col:0, row:3 },
  [T.WATER]:  { col:0, row:3 },
  [T.CROP]:   { col:0, row:3 },
  [T.TREE]:   { col:0, row:3 },
  [T.HOUSE]:  { col:0, row:3 },
  [T.WELL]:   { col:0, row:3 },
  [T.SHOP]:   { col:0, row:3 },
};

// 绘制地块（素材贴图版）
function drawIsoTileTop(x, y, tileCol, tileRow, highlight=false) {
  if (!tilesetLoaded) return;
  const sx = tileCol * TS;
  const sy = tileRow * TS;
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(tilesetImg, sx, sy, TS, TS,
    x - TILE/2, y - TILE/2, TILE, TILE);
  if (highlight) {
    ctx.fillStyle = 'rgba(255,220,80,0.35)';
    ctx.fillRect(x - TILE/2, y - TILE/2, TILE, TILE);
    ctx.strokeStyle='rgba(255,220,80,0.9)'; ctx.lineWidth=2;
    ctx.strokeRect(x - TILE/2, y - TILE/2, TILE, TILE);
  }
  ctx.restore();
}

function drawIsoTile(x, y, color, highlight=false) {
  ctx.fillStyle = highlight ? '#ffe88a' : color;
  ctx.fillRect(x - TILE/2, y - TILE/2, TILE, TILE);
  // 网格线
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x - TILE/2, y - TILE/2, TILE, TILE);
  if(highlight) {
    ctx.strokeStyle='rgba(255,220,80,0.8)'; ctx.lineWidth=2;
    ctx.strokeRect(x - TILE/2, y - TILE/2, TILE, TILE);
  }
}

function drawTile(r, c) {
  const type = tileMap[r][c];
  const {x,y} = iso(c, r);
  const W=canvas.width, H=canvas.height;
  if(x<-TILE*2||x>W+TILE*2||y<-TILE*2||y>H+TILE*2) return;

  const pr=Math.round(player.wy), pc=Math.round(player.wx);
  const isPlayerTile = (r===pr && c===pc);

  const color = GROUND_COLORS[type] || GROUND_COLORS[T.GRASS];
  drawIsoTile(x, y, color, isPlayerTile);

  // 草地类用 tileset 贴图覆盖
  if (type === T.GRASS || type === T.TREE || type === T.HOUSE || type === T.WELL || type === T.SHOP) {
    const uv = TILE_UV[type];
    drawIsoTileTop(x, y, uv.col, uv.row, isPlayerTile);
  }

  const crop = cropMap[r][c];

  // 水面波纹
  if(type===T.WATER) {
    ctx.strokeStyle=`rgba(255,255,255,${0.2+Math.sin(Date.now()*0.003+c)*0.15})`;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(x-12, y-2); ctx.lineTo(x+12, y-2);
    ctx.stroke();
  }

  // 翻土纹路
  if(type===T.TILLED || type===T.CROP) {
    ctx.strokeStyle='rgba(80,40,10,0.4)'; ctx.lineWidth=0.8;
    for(let i=1;i<4;i++){
      const ly = y - TILE/2 + (TILE/4)*i;
      ctx.beginPath();
      ctx.moveTo(x - TILE/2 + 4, ly);
      ctx.lineTo(x + TILE/2 - 4, ly);
      ctx.stroke();
    }
  }

  // 物件
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(crop) {
    const cfg=CROPS[crop.type];
    const si=crop.ready?cfg.stages.length-1:Math.min(crop.daysGrown,cfg.stages.length-1);
    const sz=crop.ready?28:22;
    ctx.font=`${sz}px serif`;
    ctx.fillText(cfg.stages[si], x, y);
    if(crop.ready) {
      const a=(Math.sin(Date.now()*0.006)+1)*0.4+0.2;
      ctx.strokeStyle=`rgba(255,220,60,${a})`; ctx.lineWidth=2;
      ctx.strokeRect(x-TILE/2, y-TILE/2, TILE, TILE);
    }
    if(crop.watered) {
      ctx.fillStyle='rgba(80,160,240,0.15)';
      ctx.fillRect(x-TILE/2, y-TILE/2, TILE, TILE);
    }
  }

  if(type===T.HOUSE) { ctx.font='32px serif'; ctx.fillText('🏠',x,y); }
  else if(type===T.SHOP) { ctx.font='28px serif'; ctx.fillText('🏪',x,y); }
  else if(type===T.WELL) { ctx.font='24px serif'; ctx.fillText('🪣',x,y); }
  else if(type===T.TREE) { ctx.font='34px serif'; ctx.fillText('🌳',x,y-4); }
}

// ============================================================
// 加载角色 Spritesheet
// ============================================================
const characterSprite = new Image();
characterSprite.src = 'assets/images/player/walk/base/player_walk_base01.png';
let spriteLoaded = false;
characterSprite.onload = () => { spriteLoaded = true; };

// Sprite参数
const SP_FRAME_W = 32, SP_FRAME_H = 32;
const SP_FRAMES = 6;  // 每方向6帧
const SP_DIRS = { down: 0, up: 1, right: 2, left: 3 };
const SP_SCALE = 2.5; // 放大倍数 → 80×80显示

// 动画状态
let spFrame = 0;
let spFrameTimer = 0;
const SP_FRAME_MS = 130;

// ============================================================
// 绘制农夫玩家（Sprite版）
// ============================================================
function drawCat(x, y) {
  // 阴影：贴在角色脚底（y就是角色中心，脚底≈y + sprite高度一半）
  const footY = y + SP_FRAME_H * SP_SCALE * 0.3;
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x, footY, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  if (!spriteLoaded) {
    // 素材未加载时显示占位圆
    ctx.save();
    ctx.fillStyle = '#f0a040';
    ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }

  const dirIdx = SP_DIRS[player.dir] ?? 0;
  const frameIdx = player.moving ? spFrame : 0;
  const sx = (dirIdx * SP_FRAMES + frameIdx) * SP_FRAME_W;

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(
    characterSprite,
    sx, 0, SP_FRAME_W, SP_FRAME_H,
    x - SP_FRAME_W * SP_SCALE / 2,
    y - SP_FRAME_H * SP_SCALE / 2,
    SP_FRAME_W * SP_SCALE,
    SP_FRAME_H * SP_SCALE
  );
  ctx.restore();

  ctx.fillStyle='rgba(255,160,140,0.4)';
  ctx.beginPath(); ctx.ellipse(-7,-10,4,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,-10,4,3,0,0,Math.PI*2); ctx.fill();

  const toolEmoji={hoe:'⛏️',seed:'🌱',water:'💧',harvest:'🎋'};
  if(toolEmoji[currentTool]) {
    ctx.font='14px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(toolEmoji[currentTool], 16,-20);
  }

  ctx.restore();
}

// ============================================================
// 渲染主函数
// ============================================================
function render() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // 背景填充
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(0, 0, W, H);

  // 俧视角瓦片（逐行逐列）
  for(let r=0;r<MAP_ROWS;r++)
    for(let c=0;c<MAP_COLS;c++)
      drawTile(r,c);

  // 玩家
  const {x,y}=iso(player.wx, player.wy);
  drawCat(x, y);

  // 操作提示
  ctx.fillStyle='rgba(245,215,142,0.75)';
  ctx.font='12px serif'; ctx.textAlign='center'; ctx.textBaseline='top';
  const hints={hoe:'走到任意地块，按✅锄地',seed:`播种:${CROPS[selectedSeed].icon}${CROPS[selectedSeed].name}(剩${seedBag[selectedSeed]||0}袋)`,water:'走到作物旁，按✅浇水',harvest:'走到成熟作物旁，按✅收获'};
  if(hints[currentTool]) ctx.fillText(hints[currentTool], W/2, H-130);
}

function drawCloud(cx, cy, scale) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(scale,scale);
  ctx.fillStyle='rgba(255,255,255,0.85)';
  [[0,0,22],[20,-8,18],[40,2,20],[-18,4,16]].forEach(([x,y,r])=>{
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ============================================================
// 摇杆
// ============================================================
const joyWrap=document.getElementById('joystick-wrap');
const joyStick=document.getElementById('joy-stick');
const JR=50, JSR=21;
let joyActive=false, joyDX=0, joyDY=0, joyTid=null;

joyWrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0]; joyTid=t.identifier; joyActive=true; updateJoy(t);
},{passive:false});
window.addEventListener('touchmove',e=>{
  if(!joyActive) return;
  for(let t of e.changedTouches) if(t.identifier===joyTid){updateJoy(t);break;}
},{passive:false});
window.addEventListener('touchend',e=>{
  for(let t of e.changedTouches) if(t.identifier===joyTid){
    joyActive=false; joyDX=0; joyDY=0;
    joyStick.style.transform='translate(0,0)'; break;
  }
});
function updateJoy(touch){
  const rect=joyWrap.getBoundingClientRect();
  const cx=rect.left+JR, cy=rect.top+JR;
  let dx=touch.clientX-cx, dy=touch.clientY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const maxD=JR-JSR;
  if(dist>maxD){dx=dx/dist*maxD; dy=dy/dist*maxD;}
  joyDX=dx/maxD; joyDY=dy/maxD;
  joyStick.style.transform=`translate(${dx}px,${dy}px)`;
}

// ============================================================
// 游戏循环
// ============================================================
let lastT=0;
const SPEED=3.5;

function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;

  // 移动：等距坐标
  // 摇杆 → 屏幕方向（右=屏幕右，上=屏幕上）
  // 等距映射：屏幕右=等距右下，屏幕上=等距右上
  // wx += (dx - dy) * k  （等距X对应屏幕水平+垂直差）
  // wy += (dx + dy) * k  （等距Y对应屏幕水平+垂直和）
  if(joyActive && (Math.abs(joyDX)>0.08||Math.abs(joyDY)>0.08)){
    const sp=SPEED*dt;
    // 等距方向修正：
    // 屏幕向右(dx+) → wx+, wy+（往右下走）
    // 屏幕向上(dy-) → wx+, wy-（往右上走）
    const nx = player.wx + (joyDX + joyDY)*sp;
    const ny = player.wy + (joyDY - joyDX)*sp;

    // 边界+碰撞
    const BLOCKED=[T.HOUSE,T.TREE,T.WATER];
    const HALF = 0.4; // 角色碰撞半径（格子单位）

    // 检查某个坐标是否可行走
    function canWalk(wx, wy) {
      // 越界判断
      if (wx - HALF < 0 || wx + HALF > MAP_COLS - 1) return false;
      if (wy - HALF < 0 || wy + HALF > MAP_ROWS - 1) return false;
      // 检查角色占据的四个角
      const corners = [
        [Math.floor(wy - HALF), Math.floor(wx - HALF)],
        [Math.floor(wy - HALF), Math.floor(wx + HALF)],
        [Math.floor(wy + HALF), Math.floor(wx - HALF)],
        [Math.floor(wy + HALF), Math.floor(wx + HALF)],
      ];
      for (const [r, c] of corners) {
        const rr = Math.max(0, Math.min(MAP_ROWS-1, r));
        const cc = Math.max(0, Math.min(MAP_COLS-1, c));
        if (BLOCKED.includes(tileMap[rr][cc])) return false;
      }
      return true;
    }

    if (canWalk(nx, ny)) {
      player.wx = nx; player.wy = ny;
    } else if (canWalk(nx, player.wy)) {
      // X方向可以滑动
      player.wx = nx;
    } else if (canWalk(player.wx, ny)) {
      // Y方向可以滑动
      player.wy = ny;
    }
    if(Math.abs(joyDX)>Math.abs(joyDY)) player.dir=joyDX>0?'right':'left';
    else player.dir=joyDY>0?'down':'up';
    player.moving=true;
  } else { player.moving=false; }

  // 更新sprite动画帧
  if (player.moving) {
    spFrameTimer += dt * 1000;
    if (spFrameTimer >= SP_FRAME_MS) {
      spFrameTimer = 0;
      spFrame = (spFrame + 1) % SP_FRAMES;
    }
  } else {
    spFrame = 0;
    spFrameTimer = 0;
  }

  // 相机平滑跟随
  const {x:tx,y:ty}=iso(player.wx,player.wy);
  camX+=(tx-canvas.width/2)*0.12;
  camY+=(ty-canvas.height/2)*0.12;

  render();
  requestAnimationFrame(loop);
}

// ============================================================
// 行动按钮
// ============================================================
function doAction(){
  const r=Math.round(player.wy), c=Math.round(player.wx);
  if(r<0||r>=MAP_ROWS||c<0||c>=MAP_COLS) return;
  const type=tileMap[r][c];

  if(type===T.SHOP){ openShop(); return; }

  if(currentTool==='hoe'){
    if(type===T.GRASS||type===T.PATH){
      tileMap[r][c]=T.TILLED; showToast('翻土完成 ⛏️');
    } else if(type===T.TILLED){ showToast('已翻过土啦～'); }
    else showToast('这里不能翻土');
  }
  else if(currentTool==='seed'){
    if(type!==T.TILLED){ showToast('请先锄地再播种'); return; }
    if(!(seedBag[selectedSeed]>0)){ showToast(`没有${CROPS[selectedSeed].name}种子了！`); return; }
    seedBag[selectedSeed]--;
    tileMap[r][c]=T.CROP;
    cropMap[r][c]={type:selectedSeed,daysGrown:0,watered:false,ready:false};
    showToast(`种下了${CROPS[selectedSeed].icon}${CROPS[selectedSeed].name}`);
  }
  else if(currentTool==='water'){
    const crop=cropMap[r][c];
    if(!crop){ showToast('这里没有作物'); return; }
    if(crop.watered){ showToast('今天已经浇过水啦 💧'); return; }
    crop.watered=true; showToast('浇水完成 💧');
  }
  else if(currentTool==='harvest'){
    const crop=cropMap[r][c];
    if(!crop||!crop.ready){
      showToast(crop?'还没成熟，再等等～':'这里没有作物'); return;
    }
    const cfg=CROPS[crop.type];
    coins+=cfg.sell; harvestBag[crop.type]=(harvestBag[crop.type]||0)+1;
    showToast(`收获${cfg.icon}${cfg.name}！+${cfg.sell}枚铜钱 🎉`);
    updateHUD();
    tileMap[r][c]=T.TILLED; cropMap[r][c]=null;
  }
}

// ============================================================
// 工具 / 商店 / 入睡
// ============================================================
function setTool(el,tool){
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); currentTool=tool;
}

function switchSeed(){
  // 循环切换所有有库存的种子
  const allTypes = Object.keys(CROPS);
  const withStock = allTypes.filter(t => (seedBag[t]||0) > 0);
  if(withStock.length === 0){ showToast('没有任何种子，去商店购买！'); return; }
  const idx = withStock.indexOf(selectedSeed);
  const nextIdx = (idx + 1) % withStock.length;
  selectedSeed = withStock[nextIdx];
  // 自动切换到播种工具
  const seedBtn = document.querySelector('[data-tool="seed"]');
  setTool(seedBtn, 'seed');
  updateSeedSwitchUI();
  showToast(`切换种子：${CROPS[selectedSeed].icon}${CROPS[selectedSeed].name}(剩${seedBag[selectedSeed]}袋)`);
}

function updateSeedSwitchUI(){
  const cfg = CROPS[selectedSeed];
  const stock = seedBag[selectedSeed] || 0;
  document.getElementById('seed-switch-icon').textContent = cfg.icon;
  document.getElementById('seed-switch-name').textContent = cfg.name + (stock>0 ? `x${stock}` : '无');
  // 没库存时变灯
  const btn = document.getElementById('seed-switch-btn');
  btn.style.opacity = stock > 0 ? '1' : '0.4';
}

function nextDay(){
  day++; if(day>28){day=1;seasonIdx=(seasonIdx+1)%4;}
  for(let r=0;r<MAP_ROWS;r++) for(let c=0;c<MAP_COLS;c++){
    const crop=cropMap[r][c];
    if(crop&&!crop.ready){ if(crop.watered) crop.daysGrown++; crop.watered=false;
      if(crop.daysGrown>=CROPS[crop.type].days) crop.ready=true; }
  }
  updateHUD(); showToast(`🌙 第${day}天开始了`);
}

function openShop(){ updateSellGrid(); document.getElementById('shop-panel').style.display='flex'; }
function closeShop(){ document.getElementById('shop-panel').style.display='none'; }

function buySeed(type){
  const cfg=CROPS[type];
  if(coins<cfg.cost){ showToast('铜钱不够！'); return; }
  coins-=cfg.cost; seedBag[type]=(seedBag[type]||0)+1;
  selectedSeed=type; updateHUD(); updateSeedSwitchUI();
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-tool="seed"]').classList.add('active');
  currentTool='seed';
  showToast(`购入${cfg.icon}${cfg.name}种子 -${cfg.cost}枚`);
  closeShop();
}

function sellCrop(type){
  const qty=harvestBag[type]||0; if(!qty) return;
  const earned=qty*CROPS[type].sell; coins+=earned; harvestBag[type]=0;
  updateHUD(); showToast(`出售${CROPS[type].icon}x${qty} +${earned}枚！`);
  updateSellGrid();
}

function updateSellGrid(){
  const el=document.getElementById('sellGrid');
  const entries=Object.entries(harvestBag).filter(([k,v])=>v>0);
  if(!entries.length){ el.innerHTML='<div style="color:#886640;font-size:11px;padding:6px;grid-column:1/-1">暂无农产品</div>'; return; }
  el.innerHTML=entries.map(([t,q])=>`<div class="sitem" onclick="sellCrop('${t}')">
    <span class="sitem-icon">${CROPS[t].icon}</span>
    <span class="sitem-name">${CROPS[t].name}x${q}</span>
    <span class="sitem-price">🪙${CROPS[t].sell}</span>
    <span class="sitem-desc">点击出售</span>
  </div>`).join('');
}

function updateHUD(){
  document.getElementById('coinVal').textContent=coins;
  document.getElementById('dayVal').textContent=day;
  document.getElementById('seasonVal').textContent=SEASONS[seasonIdx];
}

let toastT=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(toastT) clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

// ============================================================
// 启动
// ============================================================
const {x:ix,y:iy}=iso(player.wx,player.wy);
camX=ix-canvas.width/2; camY=iy-canvas.height/2;
updateSeedSwitchUI();
requestAnimationFrame(ts=>{lastT=ts; loop(ts);});
</script>
